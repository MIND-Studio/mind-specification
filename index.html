<script>
(function () {
  // Theme: ?theme=dark|light overrides system pref; html.dark also works
  const themeOverride = new URLSearchParams(location.search).get('theme');
  if (themeOverride === 'dark') document.documentElement.classList.add('dark');
  if (themeOverride === 'light') document.documentElement.classList.remove('dark');
  const isDark = themeOverride === 'dark'
                 || (themeOverride !== 'light'
                     && (window.matchMedia('(prefers-color-scheme: dark)').matches
                         || document.documentElement.classList.contains('dark')));

  const themeVariables = isDark ? {
    background:           '#111114',
    primaryColor:         '#1e293b',
    primaryTextColor:     '#e2e8f0',
    primaryBorderColor:   '#475569',
    secondaryColor:       '#0c2942',
    tertiaryColor:        '#0a2329',
    lineColor:            '#94a3b8',
    textColor:            '#e2e8f0',
    mainBkg:              '#1e293b',
    clusterBkg:           'transparent',
    clusterBorder:        '#475569',
    edgeLabelBackground:  '#111114',
    fontFamily:           'ui-monospace, "JetBrains Mono", Menlo, monospace',
    fontSize:             '13px'
  } : {
    background:           '#ffffff',
    primaryColor:         '#1e293b',
    primaryTextColor:     '#f8fafc',
    primaryBorderColor:   '#0f172a',
    secondaryColor:       '#0c2942',
    tertiaryColor:        '#ecfeff',
    lineColor:            '#475569',
    textColor:            '#0f172a',
    mainBkg:              '#1e293b',
    clusterBkg:           'transparent',
    clusterBorder:        '#cbd5e1',
    edgeLabelBackground:  '#ffffff',
    fontFamily:           'ui-monospace, "JetBrains Mono", Menlo, monospace',
    fontSize:             '13px'
  };

  mermaid.initialize({
    startOnLoad: false,
    theme: 'base',
    themeVariables,
    securityLevel: 'loose',
    flowchart: { htmlLabels: true, padding: 18, nodeSpacing: 28, rankSpacing: 36 }
  });

  marked.use({
    renderer: {
      code(token) {
        if (token.lang === 'mermaid') {
          return '<div class="mermaid">' + token.text + '</div>';
        }
        return false;
      }
    }
  });

  const el = document.getElementById('content');
  const srcEl = document.getElementById('md-source');
  const raw = srcEl ? srcEl.textContent.trim() : '';

  if (!raw || raw === 'NEEDS_BUILD') {
    el.innerHTML =
      '<h1>Build not run yet</h1>' +
      '<p>This HTML viewer needs the markdown inlined first. From the architecture directory, run:</p>' +
      '<pre><code>python3 build.py</code></pre>' +
      '<p>Then reload this page. Or just read the source directly: <a href="architecture.md">architecture.md</a>.</p>';
    return;
  }

  try {
    // atob → Latin-1 byte-string; decode bytes as UTF-8 properly
    const bin   = atob(raw);
    const bytes = new Uint8Array(bin.length);
    for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
    const md    = new TextDecoder('utf-8').decode(bytes);
    el.innerHTML = marked.parse(md);
    // Slug-ify heading text into IDs so in-page anchor links (#apps, …) work.
    el.querySelectorAll('h1, h2, h3, h4, h5, h6').forEach(h => {
      if (!h.id) {
        h.id = h.textContent.trim().toLowerCase()
          .replace(/[^\w\s-]/g, '')
          .replace(/\s+/g, '-');
      }
    });
    // Rewrite cross-document .md links to their HTML viewers (HTML viewers live at root).
    el.querySelectorAll('a[href]').forEach(a => {
      const raw = a.getAttribute('href');
      if (!raw || !raw.includes('.md')) return;
      const hashIdx = raw.indexOf('#');
      const hash = hashIdx >= 0 ? raw.substring(hashIdx) : '';
      let path = hashIdx >= 0 ? raw.substring(0, hashIdx) : raw;
      path = path.replace(/^(\.\/|(\.\.\/)+)/, '');     // strip leading ./ or ../
      let target = null;
      if      (path === 'architecture.md')                                                    target = 'index.html';
      else if (path === 'apps.md')                                                            target = 'apps.html';
      else if (path === 'workers.md')                                                         target = 'workers.html';
      else if (path === 'capabilities.md' || path === 'protocol/capabilities.md' || path === 'src/protocol/capabilities.md') target = 'capabilities.html';
      else {
        const m = path.match(/^(?:src\/)?(?:protocol\/)?(\d+)-.*\.md$/);
        if (m) target = 'protocol-' + m[1] + '.html';
      }
      if (target) a.setAttribute('href', target + hash);
    });
    // If the URL came in with a hash, scroll now that the IDs exist.
    if (location.hash && location.hash.length > 1) {
      const target = document.getElementById(decodeURIComponent(location.hash.slice(1)));
      if (target) target.scrollIntoView();
    }
    mermaid.run({ querySelector: '.mermaid' });
  } catch (e) {
    el.innerHTML = '<h1>Render error</h1><p><code>' + e.message + '</code></p>';
  }
})();
</script>
