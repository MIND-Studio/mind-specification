name: build

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'build.py'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: false

jobs:
  rebuild:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Inline markdown into HTML viewers
        run: python3 build.py

      - name: Commit rebuilt viewers if changed
        run: |
          if [ -z "$(git status --porcelain '*.html')" ]; then
            echo "No HTML changes — nothing to commit."
            exit 0
          fi
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add '*.html'
          git commit -m "Rebuild HTML viewers from src/ [skip ci]"
          git push
